name: Production Deployment
run-name: Production Deployment - ${{ github.ref_name }} - ${{ github.event.head_commit.message }}
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  deploy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Prisma migrate db
        run: pnpm exec prisma migrate deploy
      - name: Prisma generate client
        run: pnpm exec prisma generate
      - name: Build
        run: pnpm build
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright tests
        run: pnpm test
      - name: Init Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Fly.io add secrets
        run: |
          flyctl secrets set AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          flyctl secrets set DATABASE_URL=${{ secrets.DATABASE_URL }}
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --ha=false
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
